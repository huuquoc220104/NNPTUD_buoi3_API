<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>Product Dashboard</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container-fluid py-4">
      <div class="row">
        <div class="col-12">
          <h1 class="text-center mb-4">Product Dashboard</h1>

          <!-- Search Box -->
          <div class="card mb-3">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-6">
                  <label for="searchInput" class="form-label"
                    >Tìm kiếm theo Title:</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="searchInput"
                    placeholder="Nhập tên sản phẩm..."
                  />
                </div>
                <div class="col-md-6">
                  <label for="limitSelect" class="form-label"
                    >Số lượng hiển thị:</label
                  >
                  <select class="form-select" id="limitSelect">
                    <option value="5">5 sản phẩm</option>
                    <option value="10" selected>10 sản phẩm</option>
                    <option value="20">20 sản phẩm</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Loading Indicator -->
          <div id="loadingIndicator" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Đang tải dữ liệu...</p>
          </div>

          <!-- Products Table -->
          <div id="tableContainer" style="display: none">
            <div class="table-responsive">
              <table class="table table-striped table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>
                      Title
                      <button class="btn btn-sm btn-light ms-2" id="sortTitle">
                        <i class="sort-icon">⇅</i>
                      </button>
                    </th>
                    <th>
                      Giá
                      <button class="btn btn-sm btn-light ms-2" id="sortPrice">
                        <i class="sort-icon">⇅</i>
                      </button>
                    </th>
                    <th>Danh mục</th>
                  </tr>
                </thead>
                <tbody id="productTableBody">
                  <!-- Products will be inserted here -->
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <nav aria-label="Product pagination">
              <ul
                class="pagination justify-content-center"
                id="paginationContainer"
              >
                <!-- Pagination buttons will be inserted here -->
              </ul>
            </nav>

            <!-- Stats -->
            <div class="text-center mt-3">
              <p class="text-muted">
                Hiển thị <span id="startItem">0</span> -
                <span id="endItem">0</span> trong tổng số
                <span id="totalItems">0</span> sản phẩm
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Description Tooltip -->
    <div id="descriptionTooltip" class="description-tooltip">
      <div class="tooltip-content"></div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
